name = "pure-blanche-guestbook"
main = "src/index.js"
compatibility_date = "2024-11-06"

# 커스텀 도메인. 존(pure-blanche.com)이 Cloudflare에 있으므로
# 배포 시 DNS 레코드 + 인증서가 자동 생성된다.
routes = [
  { pattern = "api.pure-blanche.com", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "pure-blanche-guestbook"
# D1 database id (`npx wrangler d1 create` 출력값). 계정 인증이 있어야 사용 가능 — 시크릿 아님.
database_id = "0bb79a1d-6ab4-44dc-b99f-33763820c3e7"
