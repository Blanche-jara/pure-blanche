<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1A0A"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <!-- Green neon glow -->
    <radialGradient id="glow" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#00D992" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00D992" stop-opacity="0"/>
    </radialGradient>
    <!-- Card gradient - left card -->
    <linearGradient id="cardL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1F1A"/>
      <stop offset="100%" stop-color="#101210"/>
    </linearGradient>
    <!-- Card gradient - right card -->
    <linearGradient id="cardR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1F1A"/>
      <stop offset="100%" stop-color="#101210"/>
    </linearGradient>
    <!-- Green accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2FD6A1"/>
      <stop offset="100%" stop-color="#00D992"/>
    </linearGradient>
    <!-- Spade glow filter -->
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Card edge highlight -->
    <linearGradient id="edgeL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D992" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D992" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="edgeR" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00D992" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D992" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Subtle radial glow behind cards -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#glow)"/>

  <!-- Subtle grid pattern for texture -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#00D992" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#00D992" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="342" x2="512" y2="342" stroke="#00D992" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Left card (tilted -12deg) -->
  <g filter="url(#cardShadow)">
    <g transform="translate(256, 260) rotate(-12)">
      <rect x="-72" y="-100" width="144" height="200" rx="12" ry="12" fill="url(#cardL)"/>
      <rect x="-72" y="-100" width="144" height="200" rx="12" ry="12" fill="none" stroke="url(#edgeL)" stroke-width="1.5"/>
      <!-- Spade suit top-left -->
      <text x="-52" y="-68" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#00D992" opacity="0.7">A</text>
      <!-- Mini spade under A -->
      <path d="M-46,-58 C-46,-58 -52,-50 -52,-45 C-52,-41 -49,-38 -46,-38 C-43,-38 -40,-41 -40,-45 C-40,-50 -46,-58 -46,-58 Z" fill="#00D992" opacity="0.5" transform="scale(0.7) translate(-17, -10)"/>
    </g>
  </g>

  <!-- Right card (tilted +12deg) -->
  <g filter="url(#cardShadow)">
    <g transform="translate(256, 260) rotate(12)">
      <rect x="-72" y="-100" width="144" height="200" rx="12" ry="12" fill="url(#cardR)"/>
      <rect x="-72" y="-100" width="144" height="200" rx="12" ry="12" fill="none" stroke="url(#edgeR)" stroke-width="1.5"/>
      <!-- Spade suit top-left -->
      <text x="-52" y="-68" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#00D992" opacity="0.7">K</text>
      <!-- Mini spade under K -->
      <path d="M-46,-58 C-46,-58 -52,-50 -52,-45 C-52,-41 -49,-38 -46,-38 C-43,-38 -40,-41 -40,-45 C-40,-50 -46,-58 -46,-58 Z" fill="#00D992" opacity="0.5" transform="scale(0.7) translate(-17, -10)"/>
    </g>
  </g>

  <!-- Center spade symbol with neon glow -->
  <g transform="translate(256, 240)" filter="url(#neon)">
    <path d="
      M0,-52
      C0,-52 -36,-20 -36,4
      C-36,18 -26,28 -14,28
      C-6,28 -2,24 0,18
      C2,24 6,28 14,28
      C26,28 36,18 36,4
      C36,-20 0,-52 0,-52
      Z
    " fill="url(#accent)"/>
    <!-- Spade stem -->
    <rect x="-4" y="22" width="8" height="22" rx="3" fill="url(#accent)"/>
    <!-- Stem base -->
    <ellipse cx="0" cy="46" rx="14" ry="5" fill="url(#accent)" opacity="0.6"/>
  </g>

  <!-- Very subtle inner border -->
  <rect x="4" y="4" width="504" height="504" rx="106" ry="106" fill="none" stroke="#00D992" stroke-opacity="0.08" stroke-width="1"/>
</svg>